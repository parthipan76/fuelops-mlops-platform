# Purpose: FuelOps GitLab CI/CD Pipeline  6 stages

stages:
  - lint
  - test
  - integration
  - build
  - deploy-staging
  - deploy-production

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: "$ACR_LOGIN_SERVER/fuelops-api"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install flake8 black --quiet
  script:
    - echo "Running flake8..."
    - flake8 src/ --max-line-length=120 --exclude=__pycache__
    - echo "Running black check..."
    - black --check src/ --line-length=120
  rules:
    - if: "$CI_PIPELINE_SOURCE == 'push'"

unit-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install fastapi uvicorn pydantic pandas numpy prometheus-client python-multipart httpx pytest pytest-cov --quiet
  script:
    - echo "Running unit tests..."
    - pytest tests/unit/ -v --cov=src --cov-report=term --cov-report=xml --cov-fail-under=70
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: "$CI_PIPELINE_SOURCE == 'push'"

integration-test:
  stage: integration
  image: python:3.11-slim
  before_script:
    - pip install fastapi uvicorn pydantic pandas numpy prometheus-client python-multipart httpx pytest --quiet
  script:
    - echo "Running integration tests..."
    - pytest tests/integration/ -v
  rules:
    - if: "$CI_COMMIT_BRANCH == 'main'"

docker-build:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache azure-cli
    - docker info
  script:
    - echo "Logging into Azure..."
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
    - az acr login --name fuelopsacrdev
    - echo "Building Docker image..."
    - docker build -t ${DOCKER_IMAGE}:${CI_COMMIT_SHA} -t ${DOCKER_IMAGE}:latest -f docker/Dockerfile src/inference/
    - echo "Pushing to ACR..."
    - docker push ${DOCKER_IMAGE}:${CI_COMMIT_SHA}
    - docker push ${DOCKER_IMAGE}:latest
    - echo "Image pushed successfully"
  rules:
    - if: "$CI_COMMIT_BRANCH == 'main'"

deploy-staging:
  stage: deploy-staging
  image: mcr.microsoft.com/azure-cli:latest
  before_script:
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
  script:
    - echo "Deploying to staging..."
    - az containerapp update --name fuelops-api-dev --resource-group rg-fuelops-dev --image ${DOCKER_IMAGE}:${CI_COMMIT_SHA}
    - echo "Staging deploy complete"
  environment:
    name: staging
    url: https://fuelops-api-dev.delightfulhill-d5055901.eastus.azurecontainerapps.io
  rules:
    - if: "$CI_COMMIT_BRANCH == 'main'"

deploy-production:
  stage: deploy-production
  image: mcr.microsoft.com/azure-cli:latest
  before_script:
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
  script:
    - echo "Deploying to production..."
    - az containerapp update --name fuelops-api-dev --resource-group rg-fuelops-dev --image ${DOCKER_IMAGE}:${CI_COMMIT_SHA}
    - echo "Production deploy complete"
  environment:
    name: production
    url: https://fuelops-api-dev.delightfulhill-d5055901.eastus.azurecontainerapps.io
  rules:
    - if: "$CI_COMMIT_BRANCH == 'main'"
      when: manual