# Purpose: FuelOps GitLab CI/CD Pipeline  6 stages
# Stages 1-2 (Day 8): lint + unit test on every push
# Stages 3-6 (Day 9-10): build, integration, staging, production

stages:
  - lint
  - test
  - integration
  - build
  - deploy-staging
  - deploy-production

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Cache pip dependencies across jobs
cache:
  paths:
    - .cache/pip

# 
# Stage 1: Lint (every push)
# 
lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install flake8 black --quiet
  script:
    - echo "Running flake8..."
    - flake8 src/ --max-line-length=120 --exclude=__pycache__
    - echo "Running black check..."
    - black --check src/ --line-length=120
  rules:
    - if: "$CI_PIPELINE_SOURCE == 'push'"

# 
# Stage 2: Unit Test (every push)
# 
unit-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install fastapi uvicorn pydantic pandas numpy prometheus-client python-multipart httpx pytest pytest-cov --quiet
  script:
    - echo "Running unit tests..."
    - pytest tests/unit/ -v --cov=src --cov-report=term --cov-fail-under=70
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: "$CI_PIPELINE_SOURCE == 'push'"
